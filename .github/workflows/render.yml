name: Render Video Pipeline

on:
  workflow_dispatch:
    inputs:
      topicId:
        description: 'The ID of the topic to render'
        required: true
        type: string
      subtitles:
        description: 'Enable subtitles (true/false)'
        required: false
        default: 'true'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FFmpeg and Fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install dependencies
        run: npm ci || npm install

      - name: Cache BGM and Overlay Assets
        uses: actions/cache@v4
        id: cache-cinematic-assets
        with:
          path: |
            public/bgm
            public/overlays
          key: cinematic-assets-v1

      - name: Generate BGM and Overlay Assets
        run: node scripts/generate-assets.js

      - name: Verify Cinematic Assets
        run: |
          echo "=== BGM Tracks ==="
          ls -la public/bgm/ || echo "No BGM directory"
          echo "=== Overlays ==="
          ls -la public/overlays/ || echo "No overlays directory"

      - name: Run Render Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/render.js --topicId "${{ github.event.inputs.topicId }}" --subtitles "${{ github.event.inputs.subtitles }}"
